<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot Auth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="auth-shell">
    <a href="/" class="back-link">Home</a>

    <section class="auth-card">
      <span class="eyebrow">Project 2</span>
      <h1>Chat Access</h1>
      <p class="subtle">Use one form and switch between login and register.</p>

      <div class="auth-toggle">
        <button id="show-login" class="toggle-btn active" type="button">Login</button>
        <button id="show-register" class="toggle-btn" type="button">Register</button>
      </div>

      <form id="auth-form" class="stack">
        <input id="auth-username" class="field" type="text" placeholder="username">
        <input id="auth-password" class="field" type="password" placeholder="password">
        <button id="auth-submit" class="primary-btn" type="submit">Login</button>
      </form>

      <div id="auth-message" class="message"></div>
    </section>
  </div>

  <div id="register-success-modal" class="modal hidden">
    <div class="modal-card">
      <div class="section-head">
        <h2>Account created</h2>
      </div>
      <p class="subtle">Your account was created successfully.</p>
      <button id="close-success-modal" class="primary-btn" type="button">OK</button>
    </div>
  </div>

  <script src="/static/js/config.js"></script>
  <script src="/static/js/chatbot-auth.js"></script>
</body>
</html>
